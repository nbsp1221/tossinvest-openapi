[project]
name = "tossinvest-openapi"
version = "0.0.0"
description = "Unofficial SDK for Toss Securities Open API"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = [
  "pytest==9.1.1",
  "ruff==0.15.18",
  "ty==0.0.51",
]

[build-system]
requires = ["hatchling==1.30.1"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tossinvest_openapi"]

[tool.pytest.ini_options]
addopts = "-q"

[tool.ruff]
line-length = 100
src = ["src", "tests"]
target-version = "py312"

[tool.ruff.lint]
select = ["B", "E4", "E7", "E9", "F", "I", "RUF", "SIM", "UP"]
