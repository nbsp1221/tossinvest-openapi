[project]
name = "tossinvest-openapi"
version = "0.1.0"
description = "Unofficial Python SDK for Toss Securities Open API"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
license-files = ["LICENSE"]
authors = [
  { name = "nbsp1221" },
]
keywords = [
  "api-client",
  "finance",
  "korean-stock",
  "openapi",
  "python",
  "sdk",
  "stock-trading",
  "toss",
  "toss-securities",
  "tossinvest",
  "trading-api",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Typing :: Typed",
]
dependencies = [
  "requests==2.34.2",
]

[project.urls]
Changelog = "https://github.com/nbsp1221/tossinvest-openapi/blob/main/CHANGELOG.md"
Documentation = "https://github.com/nbsp1221/tossinvest-openapi/tree/main/packages/python#readme"
Homepage = "https://github.com/nbsp1221/tossinvest-openapi#readme"
Issues = "https://github.com/nbsp1221/tossinvest-openapi/issues"
Repository = "https://github.com/nbsp1221/tossinvest-openapi"

[dependency-groups]
dev = [
  "pytest==9.1.1",
  "ruff==0.15.18",
  "ty==0.0.51",
]

[build-system]
requires = ["hatchling==1.30.1"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tossinvest_openapi"]

[tool.pytest.ini_options]
addopts = "-q"

[tool.ruff]
line-length = 100
src = ["src", "tests"]
target-version = "py312"

[tool.ruff.lint]
select = ["B", "E4", "E7", "E9", "F", "I", "RUF", "SIM", "UP"]
